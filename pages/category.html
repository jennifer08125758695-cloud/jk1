<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | VOGUE USA</title>
  <link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="announcement-bar">🇺🇸 Free Shipping on Orders Over <span>$75</span></div>
<header class="site-header"><div class="header-top">
  <div class="logo"><a href="../index.html"><div class="logo-mark"><span>V</span></div><div class="logo-text"><span class="logo-name">VOGUE USA</span><span class="logo-tagline">American Fashion House</span></div></a></div>
  <div class="header-search"><input type="search" placeholder="Search products…"><button class="search-btn">🔍</button></div>
  <div class="header-actions"><a href="login.html" class="btn-login">Login</a><a href="signup.html" class="btn-signup">Sign Up</a><button class="cart-btn" onclick="openCart()">🛒<span class="cart-count">0</span></button></div>
</div>
<nav class="main-nav"><div class="nav-inner">
  <div class="nav-item"><a href="category.html?cat=women" class="nav-link">Women's</a></div>
  <div class="nav-item"><a href="category.html?cat=men" class="nav-link">Men's</a></div>
  <div class="nav-item"><a href="category.html?cat=kids" class="nav-link">Kids</a></div>
  <div class="nav-item"><a href="../index.html#productsSection" class="nav-link">Sale 🔥</a></div>
</div></nav></header>
<div class="breadcrumb"><div class="breadcrumb-inner" id="catBreadcrumb"><a href="../index.html">Home</a><span class="sep">›</span><span class="current" id="catTitle">Category</span></div></div>
<main style="padding:50px 0 80px">
  <div class="container">
    <div class="section-controls">
      <div><div class="section-eyebrow" id="catEyebrow">Collection</div><h2 class="section-title" id="catHeading">Products</h2></div>
      <div class="sort-filter">
        <button class="filter-btn">⚙️ Filter</button>
        <select class="sort-select" onchange="catSort(this.value)"><option value="featured">Featured</option><option value="price-low">Price: Low to High</option><option value="price-high">Price: High to Low</option><option value="rating">Top Rated</option></select>
      </div>
    </div>
    <div class="products-grid" id="catGrid"></div>
    <div class="pagination-wrap" id="catPagination" style="display:none"><button class="btn-next-page" onclick="catLoadMore()">Load More →</button></div>
  </div>
</main>
<footer class="site-footer" style="padding-top:40px"><div class="footer-bottom" style="max-width:1320px;margin:0 auto;padding:20px"><p>© 2025 VOGUE USA. All Rights Reserved.</p></div></footer>
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><div><div class="cart-title">Cart</div><div class="cart-count-text" id="cartCountText">0 items</div></div><button class="cart-close" onclick="closeCart()">✕</button></div><div class="cart-items" id="cartItems"></div><div class="cart-footer" id="cartFooter" style="display:none"><div class="cart-summary-row"><span>Subtotal</span><span id="cartSubtotal">$0.00</span></div><div class="cart-summary-row"><span>Shipping</span><span id="cartShipping">$9.99</span></div><div class="cart-summary-row"><span>Tax</span><span id="cartTax">$0.00</span></div><div class="cart-summary-row total"><span>Total</span><span id="cartTotal">$0.00</span></div><a href="checkout.html" class="btn-checkout">🔒 Checkout</a></div></div>
<div class="modal-overlay" id="modalOverlay"><div class="quick-view-modal" id="quickViewModal"></div></div>
<div class="toast" id="toast"></div>
<script src="../js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat');
    const sub = params.get('sub');
    let filtered = [...PRODUCTS];
    let label = 'All Products';
    if (cat === 'women') { filtered = filtered.filter(p => p.gender === 'women'); label = "Women's Fashion"; }
    else if (cat === 'men') { filtered = filtered.filter(p => p.gender === 'men'); label = "Men's Fashion"; }
    else if (cat === 'kids') { filtered = filtered.filter(p => p.gender === 'kids'); label = "Kids' Fashion"; }
    if (sub) { filtered = filtered.filter(p => p.sub === sub); label = sub; }
    document.getElementById('catTitle').textContent = label;
    document.getElementById('catHeading').innerHTML = label.replace(/(\w+)$/, '<span>$1</span>');
    document.getElementById('catEyebrow').textContent = `${filtered.length} Products`;
    document.getElementById('catBreadcrumb').innerHTML = `<a href="../index.html">Home</a><span class="sep">›</span><span class="current">${label}</span>`;
    document.getElementById('catGrid').innerHTML = filtered.map(p => renderProductCard(p)).join('');
    setTimeout(initScrollAnimations, 200);
  });
  function catSort(val) {
    let sorted = [...PRODUCTS];
    if (val === 'price-low') sorted.sort((a,b) => a.price-b.price);
    else if (val === 'price-high') sorted.sort((a,b) => b.price-a.price);
    else if (val === 'rating') sorted.sort((a,b) => b.rating-a.rating);
    document.getElementById('catGrid').innerHTML = sorted.map(p => renderProductCard(p)).join('');
  }
  document.getElementById('cartOverlay')?.addEventListener('click', closeCart);
  document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeQuickView(); });
</script>
</body></html>
