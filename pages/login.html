<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | VOGUE USA</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page { min-height: 80vh; display:flex; align-items:center; justify-content:center; padding:60px 20px; background:var(--cream); }
    .auth-card { background:var(--white); padding:50px 44px; border-radius:16px; box-shadow:0 8px 50px rgba(0,0,0,0.1); max-width:440px; width:100%; }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-title { font-family:var(--font-display); font-size:1.8rem; font-weight:700; text-align:center; margin-bottom:6px; }
    .auth-sub { text-align:center; color:var(--text-light); font-size:14px; margin-bottom:32px; }
    .auth-form .form-group { margin-bottom:16px; }
    .auth-form label { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gray-dark); display:block; margin-bottom:6px; }
    .auth-form input { width:100%; padding:12px 16px; border:1.5px solid var(--gray-mid); border-radius:var(--radius); font-size:14px; outline:none; transition:var(--transition); }
    .auth-form input:focus { border-color:var(--black); }
    .btn-auth { width:100%; padding:14px; background:var(--black); color:var(--white); font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border-radius:var(--radius); cursor:pointer; border:none; margin-top:8px; transition:var(--transition); }
    .btn-auth:hover { background:var(--accent); }
    .auth-divider { text-align:center; color:var(--gray); font-size:13px; margin:20px 0; position:relative; }
    .auth-divider::before,.auth-divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--gray-mid); }
    .auth-divider::before { left:0; } .auth-divider::after { right:0; }
    .auth-switch { text-align:center; font-size:14px; color:var(--text-light); margin-top:24px; }
    .auth-switch a { color:var(--accent); font-weight:600; }
    .forgot-link { text-align:right; font-size:12px; margin-top:4px; }
    .forgot-link a { color:var(--accent); }
  </style>
</head>
<body>
<div class="announcement-bar">&#127482;&#127480; Free Shipping on Orders Over <span>$75</span></div>
<header class="site-header"><div class="header-top">
  <div class="logo"><a href="../index.html"><div class="logo-mark"><span>V</span></div><div class="logo-text"><span class="logo-name">VOGUE USA</span><span class="logo-tagline">American Fashion House</span></div></a></div>
  <div class="header-actions"><a href="signup.html" class="btn-signup">Create Account</a></div>
</div></header>
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><div style="display:inline-flex;align-items:center;gap:8px"><div class="logo-mark"><span>V</span></div></div></div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your VOGUE USA account</p>
    <form class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Enter your password" required></div>
      <div class="forgot-link"><a href="#">Forgot password?</a></div>
      <div class="recaptcha-placeholder" style="margin-top:16px">
        <div class="check-box"></div><span>I'm not a robot</span>
        <div class="recaptcha-logo"><div class="g">G</div><div style="font-size:8px;color:var(--gray)">reCAPTCHA</div></div>
      </div>
      <button type="submit" class="btn-auth">Sign In</button>
    </form>
    <div class="auth-divider">or</div>
    <button class="btn-auth" style="background:#4285f4;margin-bottom:10px" onclick="showToast('Google login coming soon!')">&#x1F4E7; Continue with Google</button>
    <div class="auth-switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script src="../js/main.js"></script>
<script>
  function handleLogin(e) {
    e.preventDefault();
    showToast('&#x2705; Logged in successfully!', 'success');
    setTimeout(() => window.location.href = '../index.html', 1200);
  }
</script>
</body></html>
