<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | VOGUE USA</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page { min-height: 80vh; display:flex; align-items:center; justify-content:center; padding:60px 20px; background:var(--cream); }
    .auth-card { background:var(--white); padding:50px 44px; border-radius:16px; box-shadow:0 8px 50px rgba(0,0,0,0.1); max-width:480px; width:100%; }
    .auth-title { font-family:var(--font-display); font-size:1.8rem; font-weight:700; text-align:center; margin-bottom:6px; }
    .auth-sub { text-align:center; color:var(--text-light); font-size:14px; margin-bottom:32px; }
    .auth-form .form-group { margin-bottom:16px; }
    .auth-form label { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gray-dark); display:block; margin-bottom:6px; }
    .auth-form input { width:100%; padding:12px 16px; border:1.5px solid var(--gray-mid); border-radius:var(--radius); font-size:14px; outline:none; transition:var(--transition); }
    .auth-form input:focus { border-color:var(--black); }
    .btn-auth { width:100%; padding:14px; background:var(--accent); color:var(--white); font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border-radius:var(--radius); cursor:pointer; border:none; margin-top:8px; transition:var(--transition); }
    .btn-auth:hover { background:var(--accent-dark); }
    .auth-switch { text-align:center; font-size:14px; color:var(--text-light); margin-top:24px; }
    .auth-switch a { color:var(--accent); font-weight:600; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  </style>
</head>
<body>
<div class="announcement-bar">&#127482;&#127480; Free Shipping on Orders Over <span>$75</span></div>
<header class="site-header"><div class="header-top">
  <div class="logo"><a href="../index.html"><div class="logo-mark"><span>V</span></div><div class="logo-text"><span class="logo-name">VOGUE USA</span><span class="logo-tagline">American Fashion House</span></div></a></div>
  <div class="header-actions"><a href="login.html" class="btn-login">Login</a></div>
</div></header>
<main class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join VOGUE USA for exclusive deals and faster checkout</p>
    <form class="auth-form" onsubmit="handleSignup(event)">
      <div class="form-grid">
        <div class="form-group"><label>First Name</label><input type="text" placeholder="John" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" placeholder="Smith" required></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" placeholder="john@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Create a password (min 8 chars)" minlength="8" required></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" placeholder="Repeat your password" required></div>
      <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;cursor:pointer;margin:12px 0;color:var(--text-light)">
        <input type="checkbox" style="margin-top:2px;accent-color:var(--black)">
        I agree to the <a href="terms.html" style="color:var(--accent)">Terms</a> and <a href="privacy-policy.html" style="color:var(--accent)">Privacy Policy</a>
      </label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;margin-bottom:12px;color:var(--text-light)">
        <input type="checkbox" style="accent-color:var(--black)">
        Subscribe to emails for exclusive deals and style tips
      </label>
      <div class="recaptcha-placeholder">
        <div class="check-box"></div><span>I'm not a robot</span>
        <div class="recaptcha-logo"><div class="g">G</div><div style="font-size:8px;color:var(--gray)">reCAPTCHA</div></div>
      </div>
      <button type="submit" class="btn-auth" style="margin-top:16px">Create My Account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script src="../js/main.js"></script>
<script>
  function handleSignup(e) {
    e.preventDefault();
    showToast('&#x1F389; Account created! Welcome to VOGUE USA!', 'success');
    setTimeout(() => window.location.href = '../index.html', 1500);
  }
</script>
</body></html>
